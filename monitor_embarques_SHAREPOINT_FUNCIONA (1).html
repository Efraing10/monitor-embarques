<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monitor de Embarques</title>
<style>
body{font-family:Arial;background:#f4f6f8;margin:0;padding:20px}
.resumen{display:flex;gap:20px;margin-bottom:20px}
.card{background:#fff;padding:15px;border-radius:10px;flex:1;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.card h2{margin:0;font-size:34px;color:#1f4fd8}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{padding:8px;border-bottom:1px solid #ddd;text-align:center}
th{background:#1f4fd8;color:#fff;position:sticky;top:0}
</style>
</head>
<body>
<h2>📦 Monitor de Embarques</h2>
<div class="resumen">
 <div class="card"><h2 id="totalEmbarques">0</h2>Total Embarques</div>
 <div class="card"><h2 id="totalCajas">0</h2>Total Cajas</div>
 <div class="card"><h2 id="fechaAct">--</h2>Última actualización</div>
</div>
<table>
<thead><tr><th>Fecha</th><th>Embarque</th><th>Destino</th><th>Calidad</th><th>Cajas</th><th>Transporte</th></tr></thead>
<tbody id="tabla"></tbody>
</table>
<script>
const JSON_URL="https://chanitosfrutas.sharepoint.com/sites/06.CompradeFruta/_layouts/15/download.aspx?SourceUrl=/sites/06.CompradeFruta/Documentos%20compartidos/General/DESPACHOS/datos_embarques.json";
function excelDate(n){return new Date((Number(n)-25569)*86400*1000).toLocaleDateString('es-MX')}
function cargar(){
 fetch(JSON_URL+"&ts="+Date.now(),{credentials:'include'})
 .then(r=>r.json())
 .then(d=>{
  totalEmbarques.innerText=d.resumen.total_embarques;
  totalCajas.innerText=d.resumen.total_cajas;
  fechaAct.innerText=new Date(d.fecha_actualizacion).toLocaleString('es-MX');
  tabla.innerHTML='';
  d.embarques.forEach(e=>{
   for(let i=1;i<=4;i++){
    if(e[`Calidad_${i}`]&&e[`Cantidad_${i}`]){
     tabla.innerHTML+=`<tr><td>${excelDate(e.Fecha)}</td><td>${e.numero_embarque}</td><td>${e.destino}</td><td>${e[`Calidad_${i}`]}</td><td>${e[`Cantidad_${i}`]}</td><td>${e.Transporte}</td></tr>`;
    }
   }
  })
 })
 .catch(err=>console.error(err));
}
cargar();setInterval(cargar,20000);
</script>
</body>
</html>
